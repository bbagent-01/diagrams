<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagram Engine — Render</title>
  <!-- Shared style pack. Brand-agnostic; reads var(--token). -->
  <link rel="stylesheet" href="/engine/packs/okta-marketing.css" />
  <style>
    /* No chrome. Centered diagram, suitable for iframing. */
    html, body {
      margin: 0;
      padding: 0;
      background: #FFFFFF;
    }
    .stage {
      min-height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
      box-sizing: border-box;
    }
    /* Default tokens (overridden inline via JS based on URL params).
       These mirror the structure of engine/tokens/okta.css so the
       pack's CSS resolves identically. */
    :root {
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --accent: #4B4FE8;
      --accent-text: #3D43E8;
      --accent-shadow: rgba(75, 79, 232, 0.20);
      --panel-cream: #EFE9DF;
      --panel-grad-from: #3D45E5;
      --panel-grad-to:   #8E92F0;
      --connector-on-cream: #A8A296;
      --connector-on-blue: rgba(255,255,255,0.85);
      --ink: #1A1A1A;
      --skeleton: #D9DCE3;
      --tile-radius: 22px;
      --pill-radius: 14px;
      --panel-radius: 28px;
    }
  </style>
</head>
<body>
  <div class="stage" id="stage"></div>

  <script type="module">
    import { renderSourcesHub } from '/engine/archetypes/sources-hub.js';
    import { renderPartnersHub } from '/engine/archetypes/partners-hub.js';
    import { deriveGradient, parseLabeledItem } from '/engine/archetypes/lib.js';

    // ---------- Param helpers ----------
    const params = new URLSearchParams(window.location.search);
    const get = (k, def) => {
      const v = params.get(k);
      return (v === null || v === '') ? def : v;
    };
    const sanitizeHex = (h, def) => {
      if (!h) return def;
      const m = String(h).trim().match(/^#?([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/);
      if (!m) return def;
      let s = m[1];
      if (s.length === 3) s = s.split('').map(c => c + c).join('');
      return '#' + s.toLowerCase();
    };
    // Google Fonts family allowlist for the operator-friendly UI.
    // Anything else is normalized to Inter (kept narrow on purpose so
    // operators don't accidentally name an exotic family that won't load).
    const FONT_ALLOWLIST = new Set([
      'Inter', 'DM Sans', 'IBM Plex Sans',
      'Roboto', 'Open Sans', 'Manrope', 'Plus Jakarta Sans',
      'Source Sans 3', 'Work Sans'
    ]);
    const sanitizeFont = (f) => {
      const s = String(f || '').trim().replace(/[<>"'\\]/g, '');
      return FONT_ALLOWLIST.has(s) ? s : 'Inter';
    };

    // ---------- Read params ----------
    const type    = get('type', 'sources-hub');
    const style   = get('style', 'cream');
    const accent  = sanitizeHex(get('accent', null), '#4B4FE8');
    const font    = sanitizeFont(get('font', 'Inter'));
    const glyph   = get('glyph', '');
    const title   = get('title', type === 'partners-hub' ? '' : 'Any source of truth');
    const hub     = get('hub', '');
    const edge    = get('edgeLabel', 'IdP');
    const cLabel  = get('containerLabel', 'Out of box integrations');

    // Items: pipe-separated. Sources items support "Label::icon-name"
    // (defaults to user-round). Partners items are plain strings.
    const itemsRaw = get('items', '');
    let items = [];
    if (itemsRaw) {
      if (type === 'partners-hub') {
        items = itemsRaw.split('|').map(s => s.trim()).filter(Boolean);
      } else {
        items = itemsRaw.split('|')
          .map(s => parseLabeledItem(s, 'user-round'))
          .filter(Boolean);
      }
    } else if (type === 'partners-hub') {
      items = ['Partner 1', 'Partner 2', 'Partner 3'];
    } else {
      items = [
        { label: 'HR Systems',        icon: 'file-cog' },
        { label: 'Third-party IdPs',  icon: 'users' },
        { label: 'Active Directory',  icon: 'contact' },
        { label: 'LDAP',              icon: 'user-plus' }
      ];
    }

    // ---------- Compute derived tokens ----------
    // Gradient pair: respect explicit `from`/`to` overrides, otherwise
    // derive a tasteful pair from the accent so a single color picker
    // produces a usable blue panel.
    const overrideFrom = sanitizeHex(get('gradFrom', null), null);
    const overrideTo   = sanitizeHex(get('gradTo', null), null);
    const grad = (overrideFrom && overrideTo)
      ? { from: overrideFrom, to: overrideTo }
      : deriveGradient(accent);

    // ---------- Inject Google Font ----------
    if (font) {
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(font)}:wght@400;500;600;700&display=swap`;
      document.head.appendChild(link);
    }

    // ---------- Apply CSS custom properties to :root ----------
    const root = document.documentElement;
    root.style.setProperty('--font-sans', `'${font}', system-ui, -apple-system, sans-serif`);
    root.style.setProperty('--accent', accent);
    root.style.setProperty('--accent-shadow', hexToShadow(accent));
    root.style.setProperty('--panel-grad-from', grad.from);
    root.style.setProperty('--panel-grad-to', grad.to);

    function hexToShadow(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, 0.22)`;
    }

    // ---------- Render ----------
    const stage = document.getElementById('stage');
    let html;
    if (type === 'partners-hub') {
      html = renderPartnersHub({
        title, hubName: hub, hubGlyph: glyph, edgeLabel: edge,
        items, style, accent
      });
    } else {
      html = renderSourcesHub({
        title, hubName: hub, hubGlyph: glyph, containerLabel: cLabel,
        items, style, accent
      });
    }
    stage.innerHTML = html;
  </script>
</body>
</html>
